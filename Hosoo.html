<style>
:root {
  --bg-color:#f4f4f4;
  --text-color:#111;
  --card-bg:#fff;
  --card-shadow:rgba(0,0,0,0.1);
  --primary:#4caf50;
}
[data-theme="dark"] {
  --bg-color:#121212;
  --text-color:#eee;
  --card-bg:#1e1e1e;
  --card-shadow:rgba(255,255,255,0.1);
  --primary:#81c784;
}
body {
  background:var(--bg-color);
  color:var(--text-color);
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
}
header {
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: var(--card-bg);
  box-shadow:0 2px 5px var(--card-shadow);
  position:sticky;
  top:0;
  z-index:100;
}
header h1{margin:0;font-size:1.5rem;}
#themeToggle{
  padding:8px 12px;
  cursor:pointer;
  border:none;
  background:var(--primary);
  color:#fff;
  border-radius:5px;
}
.search-sort{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  flex-wrap:wrap;
  gap:10px;
}
.search-sort input, .search-sort select{
  padding:8px;
  font-size:1rem;
  border-radius:5px;
  border:1px solid #ccc;
  flex:1;
  min-width:150px;
}
.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px 30px;
}
.card{
  background:var(--card-bg);
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px var(--card-shadow);
  cursor:pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover{
  transform: scale(1.03);
  box-shadow:0 4px 15px var(--card-shadow);
}
.card img{
  width:100%;
  border-radius:8px;
  margin-bottom:10px;
}
.card h2{
  margin:5px 0;
  font-size:1.2rem;
}
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}
.modal.active{
  opacity:1;
  pointer-events:auto;
}
.modal-content{
  background:var(--card-bg);
  padding:20px;
  border-radius:10px;
  max-width:500px;
  width:90%;
  box-shadow:0 5px 20px var(--card-shadow);
  position:relative;
}
.modal-content img{
  width:100%;
  border-radius:8px;
  margin-bottom:15px;
}
.close-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:var(--primary);
  border:none;
  color:#fff;
  padding:5px 10px;
  cursor:pointer;
  border-radius:5px;
}
.modal-content h2{margin-top:0;}
.modal-content p{margin:5px 0;font-size:0.95rem;line-height:1.4;}
</style>

const container=document.getElementById('countryContainer');
const searchInput=document.getElementById('searchInput');
const sortSelect=document.getElementById('sortSelect');
const modal=document.getElementById('modal');
const modalContent=document.getElementById('modalContent');
const closeModal=document.getElementById('closeModal');

function renderCountries(list){
  container.innerHTML="";
  list.forEach(c=>{
    const card=document.createElement('div');
    card.className="card";
    card.innerHTML=`<img src="${c.flag}" alt="Flag of ${c.name}">
      <h2>${c.name}</h2>
      <p><strong>Нийслэл:</strong> ${c.capital}</p>
      <p><strong>Хүн ам:</strong> ${c.population}</p>`;
    card.addEventListener('click',()=>showModal(c));
    container.appendChild(card);
  });
}

function showModal(country){
  modalContent.innerHTML=`<button class="close-btn" id="closeModal">Хаах</button>
    <img src="${country.flag}" alt="Flag of ${country.name}">
    <h2>${country.name}</h2>
    <p><strong>Нийслэл:</strong> ${country.capital}</p>
    <p><strong>Хүн ам:</strong> ${country.population}</p>
    <p><strong>Газар нутаг:</strong> ${country.area}</p>
    <p><strong>Түүх:</strong> ${country.history}</p>
    <p><strong>Сонирхолтой факт:</strong> ${country.funFact}</p>`;
  modal.classList.add('active');
  document.getElementById('closeModal').addEventListener('click',()=>modal.classList.remove('active'));
}

renderCountries(countries);

searchInput.addEventListener('input',()=>{
  const term=searchInput.value.toLowerCase();
  const filtered=countries.filter(c=>c.name.toLowerCase().includes(term));
  renderCountries(filtered);
});

sortSelect.addEventListener('change',()=>{
  const value=sortSelect.value;
  let sorted=[...countries];
  if(value==="name"){sorted.sort((a,b)=>a.name.localeCompare(b.name));}
  else if(value==="population"){
    sorted.sort((a,b)=>{
      const popA=parseInt(a.population.replace(/[^0-9]/g,''))||0;
      const popB=parseInt(b.population.replace(/[^0-9]/g,''))||0;
      return popB-popA;
    });
  }
  renderCountries(sorted);
});

const themeToggle=document.getElementById('themeToggle');
themeToggle.addEventListener('click',()=>{
  const current=document.body.getAttribute('data-theme');
  if(current==="light"){
    document.body.setAttribute('data-theme','dark');
    themeToggle.textContent="Light Mode";
  } else {
    document.body.setAttribute('data-theme','light');
    themeToggle.textContent="Dark Mode";
  }
});
